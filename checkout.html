<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Dash - Checkout</title>
<link rel="stylesheet" href="checkout.css">
</head>
<body>
<section class="Header">
  <img class="logo" src="foodlogo.jpeg" alt="Food Dash Logo" />
  <div class="Menu">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="builder.html">Builder</a>
    <a href="cart.html">🛒 Cart</a>
  </div>
</section>

<div class="textchange">
    <a href="menu.html" class="backbtn">← Back to Menu</a>
</div>

<h1 class="heeder">Checkout</h1>

<div class="checkout-container">
  <form class="summary_form">
    <!-- Contact Info -->
    <fieldset class="field">
      <legend class="legendd">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-icon lucide-user">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Contact Information
      </legend>
      <label for="name">Full Name</label>
      <input id="name" class="modify" type="text" placeholder="John Doe" required />
      <label for="email">Email</label>
      <input id="email" class="modify" type="email" placeholder="john@example.com" required />
      <label for="phone">Phone</label>
      <input id="phone" class="modify" type="tel" placeholder="1234567890" required />
    </fieldset>

    <!-- Delivery Address -->
    <fieldset class="field">
      <legend class="legendd">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin-icon lucide-map-pin">
          <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0" />
          <circle cx="12" cy="10" r="3" />
        </svg>
        Delivery Address
      </legend>
      <label for="street">Street Address</label>
      <input id="street" class="modify" type="text" placeholder="123 Main Street" required />
      <label for="apt">Apartment</label>
      <input id="apt" class="modify" type="text" placeholder="Apt 4B" />
      <label for="city">City</label>
      <input id="city" class="modify" type="text" placeholder="Your City" required />
      <label for="zipcode">Zip Code</label>
      <input id="zipcode" class="modify" type="text" placeholder="10001" required />
    </fieldset>

    <!-- Payment Method -->
    <fieldset class="field">
      <legend class="legendd">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-credit-card-icon lucide-credit-card">
          <rect width="20" height="14" x="2" y="5" rx="2" />
          <line x1="2" x2="22" y1="10" y2="10" />
        </svg>
        Payment Method
      </legend>
      <div class="payment_option">
       <input id="cash" name="payment" type="radio">
       <label for="cash">Cash On Delivery</label>
       <p class="option-description">Pay when your order arrives.</p>
      </div>

      <div class="payment_option">
        <input id="card" type="radio" id="card" name="payment">
        <label for="card">Debit / Credit Cards</label>
        <p class="option-description">Secure Online Payment.</p>
      </div>
    </fieldset>

    <div id="card-details" style="display:none;">
      <label for="card-number">Card Number</label>
      <input id="card-number" type="text" placeholder="1234 5678 9012 3456" />
      <label for="expiry">Expiry Date</label>
      <input id="expiry" type="text" placeholder="MM/YY" />
      <label for="cvv">CVV</label>
      <input id="cvv" type="text" placeholder="123" />
    </div>

    <fieldset class="field">
      <legend class="legendd">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-notebook-pen-icon lucide-notebook-pen">
          <path d="M13.4 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7.4" />
          <path d="M2 6h4" />
          <path d="M2 10h4" />
          <path d="M2 14h4" />
          <path d="M2 18h4" />
          <path d="M21.378 5.626a1 1 0 1 0-3.004-3.004l-5.01 5.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z" />
        </svg>
        Order Notes
      </legend>
      <input class="modify" type="text" placeholder="Any instruction for special order" />
    </fieldset>

    <div class="orderpage">
      <button type="submit" class="orderbtn">Place Order</button>
    </div>
  </form>

  <div class="order-summary">
    <h3>Order Summary</h3>
    <div id="order-items"></div>
    <hr />
    <div class="row">
      <p>Subtotal</p>
      <p id="total">$0.00</p>
    </div>
    <div class="row">
      <p>Tax (8%)</p>
      <p id="tax">$0.00</p>
    </div>
    <hr />
    <div class="total row">
      <h3>Total</h3>
      <h3 id="net-total">$0.00</h3>
    </div>
  </div>
</div>

<script src="checkout.js"></script>
</body>
</html>
